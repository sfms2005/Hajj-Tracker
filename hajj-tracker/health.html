<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المساعدة الصحية - Hajj Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="health">
  <div class="nav-overlay" id="nav-overlay" aria-hidden="true"></div>
  <aside class="sidebar" id="sidebar" aria-label="القائمة">
    <p class="sidebar-title">القائمة</p>
    <a class="sidebar-link" href="index.html">الصفحة الرئيسية</a>
    <a class="sidebar-link" href="about.html">من نحن</a>
  </aside>

  <div class="app-shell">
    <header class="topbar">
      <a href="index.html" class="logo-link">Hajj Tracker</a>
      <button type="button" class="menu-btn" id="menu-btn" aria-label="فتح القائمة">☰</button>
    </header>

    <main class="app-main" aria-label="صفحة المساعدة الصحية">
      <section class="card">
        <h1 class="page-title">المساعدة الصحية</h1>
      </section>

      <section class="notice warning">هذه الخدمة مخصصة للحالات الطارئة فقط</section>

      <section class="card">
        <form id="health-form" class="form-grid">
          <input class="input" type="text" name="name" placeholder="الاسم" required>
          <input class="input" type="text" name="floor" placeholder="رقم الدور" required>
          <input class="input" type="text" name="room" placeholder="رقم الغرفة" required>
          <textarea class="textarea" name="condition" placeholder="الحالة" required></textarea>
          <button type="submit" class="btn-primary" style="border:0;">إرسال</button>
        </form>
      </section>

      <section class="notice" id="health-status" aria-live="polite"></section>

      <a href="index.html" class="btn-primary">العودة للمسار</a>
    </main>

    <footer class="footer"></footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
